<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Log workouts, track PRs, and chart your progress." />
    <meta name="theme-color" content="#0b0b0c" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/app_icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Gym Tracker</title>
    <script>
      // Apply the saved (or OS-preferred) theme before first paint, so there's no
      // flash. App.jsx tracks and persists toggles after mount.
      (function () {
        try {
          var saved = localStorage.getItem('gymtracker.theme');
          var t = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', t);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', t === 'light' ? '#ffffff' : '#0b0b0c');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
